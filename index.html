<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dagens CyberPhoto-lyckokaka</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="brand">
        <div class="mark">CP</div>
        <div>
          <p>CyberPhoto mot 2030</p>
          <h1>Dagens lyckokaka</h1>
        </div>
      </div>
      <div class="cookie" aria-hidden="true">
        <div class="cookie-half left"></div>
        <div class="paper"></div>
        <div class="cookie-half right"></div>
      </div>
      <p class="label">Det är den lilla skillnaden som gör skillnaden.</p>
      <blockquote id="fortune">Laddar dagens tanke...</blockquote>
      <p id="reflection" class="reflection"></p>
      <button id="newFortune" type="button">Ge mig en ny tanke</button>
      <footer>En liten påminnelse på väg in till fikarummet.</footer>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
